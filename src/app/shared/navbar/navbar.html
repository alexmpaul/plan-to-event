<!-- USER ICON -->
<div class="navbar-user">
  @if (auth.isLoggedIn()) {
    <div class="user-avatar" (click)="toggleSidebar()">
      {{ getInitials() }}
    </div>
  } @else {
    <div class="user-avatar guest" (click)="openLoginModal()">
      👤
    </div>
  }
</div>

<!-- LOGIN MODAL -->
@if (showLoginModal) {
  <app-login-modal
    (closed)="closeLoginModal()"
    (loggedIn)="onLoggedIn()">
  </app-login-modal>
}

<!-- SIDEBAR OVERLAY -->
@if (showSidebar) {
  <div class="sidebar-overlay" (click)="closeSidebar()"></div>
  <div class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-avatar">{{ getInitials() }}</div>
      <div class="sidebar-username">{{ getUserName() }}</div>
      <div class="sidebar-email">{{ auth.currentUser()?.email }}</div>
    </div>

    <!-- MENU ITEMS -->
    <div class="sidebar-menu">
      <div class="menu-item" (click)="goToHome()">
        <span class="menu-icon">🏠</span>
        <span>Home</span>
      </div>
      <div class="menu-item" (click)="goToDashboard()">
        <span class="menu-icon">📋</span>
        <span>My Events</span>
      </div>
      <div class="menu-item" (click)="goToProfile()">
        <span class="menu-icon">👤</span>
        <span>Profile</span>
      </div>
      <div class="menu-divider"></div>
      <div class="menu-item danger" (click)="logout()">
        <span class="menu-icon">🚪</span>
        <span>Logout</span>
      </div>
    </div>
  </div>
}
