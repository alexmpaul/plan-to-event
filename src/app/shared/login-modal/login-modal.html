<div class="modal-overlay" (click)="close()">
  <div class="modal" (click)="$event.stopPropagation()">

    <button class="close-btn" (click)="close()">✕</button>

    @if (isLogin) {
      <!-- LOGIN -->
      <div class="form-container">
        <h2 class="form-title">Log In</h2>

        @if (error) {
          <div class="error-msg">{{ error }}</div>
        }

        <div class="input-group">
          <span class="input-icon">👤</span>
          <input [(ngModel)]="loginData.email" type="email" placeholder="Enter your Email" />
        </div>

        <div class="input-group">
          <span class="input-icon">🔒</span>
          <input [(ngModel)]="loginData.password" type="password" placeholder="Enter your Password" />
        </div>

        <div class="forgot">
          <a href="#">Forgot Password</a>
        </div>

        <button class="submit-btn" (click)="login()" [disabled]="loading">
          {{ loading ? 'Logging in...' : 'Login' }}
        </button>

        <div class="switch-mode">
          Don't have an account?
          <span (click)="toggleMode()">Sign up</span>
        </div>
      </div>

    } @else {
      <!-- SIGNUP -->
      <div class="form-container">
        <h2 class="form-title">Create an Account</h2>

        @if (error) {
          <div class="error-msg">{{ error }}</div>
        }

        <div class="input-row">
          <input [(ngModel)]="signupData.firstName" placeholder="FirstName" />
          <input [(ngModel)]="signupData.lastName" placeholder="LastName" />
        </div>

        <div class="input-group no-icon">
          <input [(ngModel)]="signupData.phone" placeholder="Phone Number" />
        </div>

        <div class="input-group no-icon">
          <input [(ngModel)]="signupData.email" type="email" placeholder="Email" />
        </div>

        <div class="input-group no-icon">
          <input [(ngModel)]="signupData.password" type="password" placeholder="Password" />
        </div>

        <button class="submit-btn" (click)="signup()" [disabled]="loading">
          {{ loading ? 'Signing up...' : 'Sign up' }}
        </button>

        <div class="switch-mode">
          Already have an account?
          <span (click)="toggleMode()">Login</span>
        </div>
      </div>
    }
  </div>
</div>
