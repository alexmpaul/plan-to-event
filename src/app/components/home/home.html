<!-- HERO SECTION -->
<div class="hero">
  <nav class="navbar">
    <div class="logo">PlanToEvent</div>
    <div class="nav-actions">
      @if (isLoggedIn()) {
        <app-navbar></app-navbar>
      } @else {
        <button class="nav-btn" (click)="goToLogin()">Login</button>
      }
    </div>
  </nav>

  <div class="hero-content">
    <div class="hero-card">
      <h1 class="hero-title">Lets make the <span>EVENT</span> happen</h1>
      <p class="hero-sub">Create Event, add vendors, compare, track budgets, manage guests and many more – all in one place.</p>
      <div class="hero-btns">
        <button class="btn-primary" (click)="planEvent()">Plan your Event</button>
        <button class="btn-secondary">Learn More</button>
      </div>
    </div>
  </div>
</div>

<!-- CATEGORIES COMPONENT -->
<app-categories></app-categories>
