<div class="page">
  <div class="header">
    <button class="back-btn" (click)="goBack()">← Back</button>
    <h1 class="page-title">
      @if (category) {
        {{ category.name }}
      }
    </h1>
  </div>

  @if (vendors.length > 0) {
    <div class="vendors-grid">
      @for (vendor of vendors; track vendor.id) {
        <div class="vendor-tile" (click)="goToDetail(vendor.id)">
          <div class="vendor-name">{{ vendor.name }}</div>
          <div class="vendor-info">📍 {{ vendor.place }}</div>
          <div class="vendor-info">📞 {{ vendor.phone }}</div>
          @if (vendor.price) {
            <div class="vendor-price">💰 {{ vendor.price }}</div>
          }
          <div class="vendor-arrow">→</div>
        </div>
      }
    </div>
  } @else {
    <div class="empty">
      <div class="empty-icon">🔍</div>
      <div class="empty-text">No vendors yet in this category</div>
    </div>
  }
  <!-- FLOATING ADD BUTTON -->
  <button class="fab" (click)="openModal()">+</button>
</div>

<!-- ADD VENDOR MODAL -->
@if (showModal) {
  <div class="modal-overlay" (click)="closeModal()">
    <div class="modal" (click)="$event.stopPropagation()">
      <h2 class="modal-title">Add Vendor</h2>

      <div class="form-group">
        <label>Name *</label>
        <input [(ngModel)]="newVendor.name" placeholder="Business name" />
      </div>
      <div class="form-group">
        <label>Place *</label>
        <input [(ngModel)]="newVendor.place" placeholder="City / Area" />
      </div>
      <div class="form-group">
        <label>Phone *</label>
        <input [(ngModel)]="newVendor.phone" placeholder="+91 XXXXX XXXXX" />
      </div>
      <div class="form-group">
        <label>Email</label>
        <input [(ngModel)]="newVendor.email" placeholder="email@example.com" />
      </div>
      <div class="form-group">
        <label>Instagram ID</label>
        <input [(ngModel)]="newVendor.instaId" placeholder="e.g. vendorname (without @)" />
      </div>
      <div class="form-group">
        <label>Pricing</label>
        <input [(ngModel)]="newVendor.price" placeholder="e.g. ₹10,000 onwards" />
      </div>
      <div class="form-group">
        <label>Rating (1–5)</label>
        <select [(ngModel)]="newVendor.rating">
          <option value="0">— None —</option>
          <option value="1">★</option>
          <option value="2">★★</option>
          <option value="3">★★★</option>
          <option value="4">★★★★</option>
          <option value="5">★★★★★</option>
        </select>
      </div>
      <div class="form-group">
        <label>Notes</label>
        <textarea [(ngModel)]="newVendor.notes" placeholder="Any extra details..."></textarea>
      </div>

      <div class="modal-actions">
        <button class="btn-cancel" (click)="closeModal()">Cancel</button>
        <button class="btn-save" (click)="saveVendor()">Add Vendor</button>
      </div>
    </div>
  </div>
}
